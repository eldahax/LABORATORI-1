<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dental Clinic Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen">

    <div class="flex w-full min-h-screen">

        <div class="w-1/4 p-10 flex flex-col items-center text-white 
    bg-gradient-to-b from-[#134E4A] via-[#0F766E] to-[#5EEAD4]">

            <img src="" class="rounded-full mb-4 border-2 border-white" alt="profile">

            <h3 class="font-semibold text-xl">Aurela Domniku</h3>
            <p class="text-sm mb-8 opacity-80">Dentist</p>

            <div class="w-full space-y-4">

                <div class="bg-white text-black p-3 rounded-lg text-center cursor-pointer font-semibold">
                    Personal Information
                </div>

                <div
                    class="text-white text-center cursor-pointer hover:bg-white hover:text-black p-3 rounded-lg transition">
                    Staff portal
                </div>

                <div
                    class="text-white text-center cursor-pointer hover:bg-white hover:text-black p-3 rounded-lg transition">
                    Notification
                </div>

                <div
                    class="text-white text-center cursor-pointer hover:bg-white hover:text-black p-3 rounded-lg transition">
                    Log Out
                </div>

            </div>

        </div>

        <div class="w-3/4 bg-white p-10">

            <h2 class="text-3xl font-semibold mb-8">Personal Information</h2>


            <form class="space-y-5 w-full">

                <input type="text" placeholder="Full Name"
                    class="w-full bg-gray-100 p-4 rounded-lg outline-none focus:ring-2 focus:ring-teal-500">

                <input type="email" placeholder="Email"
                    class="w-full bg-gray-100 p-4 rounded-lg outline-none focus:ring-2 focus:ring-teal-500">

                <input type="text" placeholder="Address"
                    class="w-full bg-gray-100 p-4 rounded-lg outline-none focus:ring-2 focus:ring-teal-500">

                <div class="flex flex-cols-2 gap-5">

                    <input type="text" placeholder="Phone Number"
                        class="w-full bg-gray-100 p-4 rounded-lg outline-none focus:ring-2 focus:ring-teal-500">

                    <input type="text" placeholder="Date of birth"
                        class="w-full bg-gray-100 p-4 rounded-lg outline-none focus:ring-2 focus:ring-teal-500">

                </div>

                <div class="flex flex-cols-2 gap-5">

                    <select class="w-full bg-gray-100 p-4 rounded-lg outline-none focus:ring-2 focus:ring-teal-500">
                        <option>Location</option>
                        <option>Pejë</option>
                        <option>Prishtinë</option>
                        <option>Gjakovë</option>
                        <option>Prizren</option>
                        <option>Gjilan</option>
                        <option>Ferizaj</option>
                    </select>

                    <input type="text" placeholder="Postal Code"
                        class="w-full bg-gray-100 p-4 rounded-lg outline-none focus:ring-2 focus:ring-teal-500">

                </div>

                <select class="w-full bg-gray-100 p-4 rounded-lg outline-none focus:ring-2 focus:ring-teal-500">
                    <option>Dental role</option>
                    <option>General Dentistry</option>
                    <option>Orthodontics</option>
                    <option>Oral Surgery</option>
                    <option>Endodontics</option>
                    <option>Nurse</option>
                    <option>Receptionist</option>
                </select>

                <div class="flex justify-between pt-6">

                    <button type="button"
                        class="border border-gray-400 text-gray-700 px-8 py-3 rounded-lg hover:bg-gray-100">
                        Discard
                    </button>

                    <button type="submit" class="bg-teal-700 text-white px-8 py-3 rounded-lg hover:bg-teal-600">
                        Save Changes
                    </button>

                </div>

            </form>

        </div>


    </div>

</body>

</html>
